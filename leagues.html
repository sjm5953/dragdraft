<!doctype html>
<html lang="en" data-theme="pink">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- tailwind -->
    <link href="src/output.css" rel="stylesheet" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-straight/css/uicons-solid-straight.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
  </head>
  <body class="overflow-hidden font-gsf">
    <!--main container-->
    <div class="h-screen">
      <!--header-->
      <div class="h-16 flex items-center px-4 justify-between">
        <div>
          <h1 class="font-black uppercase text-sm">
            <span class="text-primary">Drag</span>Draft
          </h1>
        </div>
        <div class="flex gap-2">
          <div class="dropdown dropdown-end">
            <button
              id="notificationsBtn"
              tabindex="0"
              class="btn btn-square btn-sm bg-neutral rounded-none text-base-100 relative border-0 shadow-none"
            >
              <i class="fi fi-br-bell pt-1"></i>

              <span
                id="notificationCount"
                class="hidden absolute -top-2 -right-2 min-w-5 h-5 px-1 bg-primary text-neutral text-[10px] font-black flex items-center justify-center rounded-full"
              >
                0
              </span>
            </button>

            <div
              tabindex="0"
              class="dropdown-content z-50 mt-2 w-80 bg-base-100 shadow-xl border border-neutral-200"
            >
              <div class="p-3 border-b border-neutral-200">
                <h2 class="font-black uppercase text-sm">Notifications</h2>
              </div>

              <div id="notificationsList" class="max-h-96 overflow-y-auto">
                <div class="p-4 text-sm opacity-60">Loading...</div>
              </div>
            </div>
          </div>
          <a
            href="conversations.html"
            class="btn btn-square btn-sm bg-neutral text-base-100 border-0 shadow-none rounded-none"
            ><i class="fi fi-br-comment-dots pt-1"></i
          ></a>
        </div>
      </div>
      <!--body-->
      <div
        class="flex-1 overflow-y-auto px-4 mt-4 w-full md:max-w-3xl md:mx-auto"
      >
        <!--page header-->
        <div class="flex justify-between items-center">
          <h1 class="font-black uppercase text-2xl">Leagues</h1>
          <div class="flex gap-2">
            <a
              id="openJoinModal"
              class="btn btn-sm rounded-none bg-primary text-neutral border-0 shadow-none uppercase font-black"
            >
              Join
            </a>
            <a
              class="btn btn-sm rounded-none bg-neutral text-base-100 uppercase font-black border-0 shadow-none"
              >Create</a
            >
          </div>
        </div>
        <!--league list-->
        <div id="leagueList" class="mt-6 flex flex-col gap-3"></div>
      </div>
    </div>
    <dialog id="joinModal" class="modal">
      <div class="modal-box rounded-none bg-base-100">
        <h3 class="font-black uppercase text-lg">Join League</h3>

        <form id="joinLeagueForm" class="mt-4">
          <label class="fieldset-label uppercase font-black text-xs">
            Join Code
          </label>

          <input
            id="joinCodeInput"
            type="text"
            required
            placeholder="Enter join code"
            class="input w-full rounded-none border-neutral-300"
          />

          <p id="joinModalMessage" class="text-sm mt-3 opacity-70"></p>

          <div class="flex justify-end gap-2 mt-6">
            <button
              type="button"
              id="closeJoinModal"
              class="btn btn-sm rounded-none bg-base-100 border-neutral shadow-none uppercase font-black"
            >
              Cancel
            </button>

            <button
              type="submit"
              class="btn btn-sm rounded-none bg-primary text-neutral border-0 shadow-none uppercase font-black"
            >
              Join
            </button>
          </div>
        </form>
      </div>
    </dialog>
    <script>
      const AIRTABLE_TOKEN =
        "patVP0kfX1Ch4uKWl.896c99262e92660d8728aba045b4e1cb0a3fdebd80cf3310df67f930323d66d6";
      const BASE_ID = "appWSxdKSUmtWAIAw";

      const TABLES = {
        users: "Users",
        leagueMembers: "League Members",
        leagues: "Leagues",
        seasons: "Seasons",
        notifications: "notifications",
      };

      const joinModal = document.querySelector("#joinModal");
      const openJoinModal = document.querySelector("#openJoinModal");
      const closeJoinModal = document.querySelector("#closeJoinModal");
      const joinLeagueForm = document.querySelector("#joinLeagueForm");
      const joinCodeInput = document.querySelector("#joinCodeInput");
      const joinModalMessage = document.querySelector("#joinModalMessage");

      let currentNotifications = [];
      let notificationsMarkedRead = false;

      openJoinModal.addEventListener("click", () => {
        joinCodeInput.value = "";

        joinModalMessage.textContent = "";

        joinModal.showModal();
      });

      closeJoinModal.addEventListener("click", () => {
        joinModal.close();
      });

      function updateNotificationCount(count) {
        const notificationCount = document.querySelector("#notificationCount");

        if (!count) {
          notificationCount.classList.add("hidden");
          notificationCount.textContent = "0";
          return;
        }

        notificationCount.classList.remove("hidden");
        notificationCount.textContent = count > 9 ? "9+" : count;
      }

      async function getUserNotifications(userRecordId) {
        const allNotifications = await airtableFetch(TABLES.notifications);

        return allNotifications

          .filter((notification) => {
            const users = notification.fields.user || [];

            const isUnread = notification.fields.read !== true;

            return users.includes(userRecordId) && isUnread;
          })

          .sort((a, b) => {
            return (
              new Date(b.fields.created_at) - new Date(a.fields.created_at)
            );
          });
      }

      async function updateRecord(tableName, id, fields) {
        const res = await fetch(airtableUrl(tableName, `/${id}`), {
          method: "PATCH",
          headers,
          body: JSON.stringify({ fields }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Could not update ${tableName}.`);
        }

        return data;
      }

      async function markNotificationsAsRead(notifications) {
        for (const notification of notifications) {
          console.log("Updating notification:", notification.id);

          await updateRecord(TABLES.notifications, notification.id, {
            read: true,
          });
        }
      }

      function formatNotificationDate(dateString) {
        if (!dateString) return "";

        return new Date(dateString).toLocaleDateString("en-US", {
          month: "short",

          day: "numeric",
        });
      }

      function renderNotifications(notifications) {
        const notificationsList = document.querySelector("#notificationsList");

        if (!notifications.length) {
          notificationsList.innerHTML = `
      <div class="p-4 text-sm opacity-60">
        No notifications yet.
      </div>
    `;
          return;
        }

        notificationsList.innerHTML = "";

        notifications.forEach((notification) => {
          const item = document.createElement("div");
          item.className = "p-4 border-b border-neutral-200 last:border-b-0";

          item.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <h3 class="font-black uppercase text-sm leading-tight">
          ${notification.fields.subject || "Notification"}
        </h3>

        <span class="text-[10px] uppercase opacity-50 whitespace-nowrap">
          ${formatNotificationDate(notification.fields.created_at)}
        </span>
      </div>

      <p class="text-sm opacity-70 mt-1">
        ${notification.fields.body_text || ""}
      </p>
    `;

          notificationsList.appendChild(item);
        });
      }

      async function loadNotifications() {
        const notificationsList = document.querySelector("#notificationsList");

        try {
          const userRecord = await getCurrentUserRecord();
          currentNotifications = await getUserNotifications(userRecord.id);

          renderNotifications(currentNotifications);
          updateNotificationCount(currentNotifications.length);
        } catch (err) {
          console.error(err);

          notificationsList.innerHTML = `
      <div class="p-4 text-sm text-red-700 bg-red-100">
        Could not load notifications.
      </div>
    `;
        }
      }

      const notificationsDropdown = document.querySelector(".dropdown-content");

      notificationsDropdown.addEventListener("focusin", async () => {
        if (notificationsMarkedRead || !currentNotifications.length) return;

        notificationsMarkedRead = true;

        try {
          console.log("Marking notifications as read:", currentNotifications);

          await markNotificationsAsRead(currentNotifications);

          currentNotifications = [];
          renderNotifications([]);
          updateNotificationCount(0);
        } catch (err) {
          console.error("Could not mark notifications as read:", err);
        }
      });

      async function findLeagueByJoinCode(joinCode) {
        const formula = `{join_code} = "${escapeFormulaValue(joinCode)}"`;

        const params = `?filterByFormula=${encodeURIComponent(formula)}`;

        const leagues = await airtableFetch(TABLES.leagues, params);

        return leagues[0] || null;
      }

      async function createLeagueMember({ leagueId, userId }) {
        const res = await fetch(airtableUrl(TABLES.leagueMembers), {
          method: "POST",

          headers,

          body: JSON.stringify({
            fields: {
              league: [leagueId],

              member: [userId],
            },
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);

          throw new Error("Could not join league.");
        }

        return data;
      }

      async function isAlreadyLeagueMember(league) {
        const userRecord = await getCurrentUserRecord();

        const leagueMemberIds = league.fields.league_members || [];

        for (const leagueMemberId of leagueMemberIds) {
          const leagueMember = await getLeagueMemberById(leagueMemberId);

          const memberId = leagueMember?.fields.member?.[0];

          if (memberId === userRecord.id) {
            return true;
          }
        }

        return false;
      }

      async function getLeagueMemberById(id) {
        const formula = `RECORD_ID() = "${escapeFormulaValue(id)}"`;

        const params = `?filterByFormula=${encodeURIComponent(formula)}`;

        const records = await airtableFetch(TABLES.leagueMembers, params);

        return records[0] || null;
      }

      joinLeagueForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const joinCode = joinCodeInput.value.trim();

        if (!joinCode) return;

        joinModalMessage.textContent = "Checking league...";

        try {
          const userRecord = await getCurrentUserRecord();

          const league = await findLeagueByJoinCode(joinCode);

          if (!league) {
            joinModalMessage.textContent = "No league found with that code.";

            return;
          }

          const alreadyMember = await isAlreadyLeagueMember(league);

          if (alreadyMember) {
            joinModalMessage.textContent =
              "You are already a member of this league.";

            return;
          }

          await createLeagueMember({
            leagueId: league.id,

            userId: userRecord.id,
          });

          joinModalMessage.textContent = "Joined league!";

          joinModal.close();

          await loadUserLeagues();
        } catch (err) {
          console.error(err);

          joinModalMessage.textContent = err.message;
        }
      });

      const headers = {
        Authorization: `Bearer ${AIRTABLE_TOKEN}`,
        "Content-Type": "application/json",
      };

      const currentUser = JSON.parse(localStorage.getItem("dragdraft_user"));

      if (!currentUser?.id) {
        window.location.href = "auth.html";
      }

      const leagueList = document.querySelector("#leagueList");

      function airtableUrl(tableName, params = "") {
        return `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(tableName)}${params}`;
      }

      async function getSeasonById(seasonId) {
        const formula = `RECORD_ID() = "${escapeFormulaValue(seasonId)}"`;
        const params = `?filterByFormula=${encodeURIComponent(formula)}`;
        const seasons = await airtableFetch(TABLES.seasons, params);
        return seasons[0] || null;
      }

      async function airtableFetch(tableName, params = "") {
        const res = await fetch(airtableUrl(tableName, params), { headers });
        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Airtable error loading ${tableName}`);
        }

        return data.records;
      }

      function escapeFormulaValue(value) {
        return String(value).replace(/"/g, '\\"');
      }

      async function getCurrentUserRecord() {
        const formula = `RECORD_ID() = "${escapeFormulaValue(currentUser.id)}"`;
        const params = `?filterByFormula=${encodeURIComponent(formula)}`;
        const users = await airtableFetch(TABLES.users, params);

        return users[0] || null;
      }

      async function getLeagueMemberRecords(userRecord) {
        const leagueMemberIds = userRecord.fields.league_members || [];

        if (!leagueMemberIds.length) return [];

        const formula = `OR(${leagueMemberIds

          .map((id) => `RECORD_ID() = "${escapeFormulaValue(id)}"`)

          .join(",")})`;

        const params = `?filterByFormula=${encodeURIComponent(formula)}`;

        return await airtableFetch(TABLES.leagueMembers, params);
      }

      async function getLeagueById(leagueId) {
        const formula = `RECORD_ID() = "${escapeFormulaValue(leagueId)}"`;
        const params = `?filterByFormula=${encodeURIComponent(formula)}`;
        const leagues = await airtableFetch(TABLES.leagues, params);

        return leagues[0] || null;
      }

      function getLinkedName(value, fallback = "Not set") {
        if (Array.isArray(value)) return value[0] || fallback;
        return value || fallback;
      }

      function renderLeagueCard(league, leagueMember, activeSeasonName) {
        const leagueName = league.fields.name || "Untitled League";
        const badgeUrl = league.fields.league_badge_url || "";

        const card = document.createElement("a");
        card.href = `league-detail.html?league=${league.id}`;
        card.className =
          "bg-neutral-200 flex items-center gap-4 p-4 no-underline text-neutral hover:bg-neutral-300 transition";

        card.innerHTML = `
    ${
      badgeUrl
        ? `<img src="${badgeUrl}" alt="" class="w-14 h-14 object-cover bg-neutral-300" />`
        : `<div class="w-10 h-10 bg-neutral text-base-100 flex items-center justify-center font-black uppercase">
            ${leagueName.charAt(0)}
          </div>`
    }

    <div class="flex-1">
      <h1 class="font-black uppercase text-md leading-tight">${leagueName}</h1>
      <h2 class="text-xs opacity-60 uppercase">${activeSeasonName}</h2>
    </div>

    <i class="fi fi-br-angle-right text-sm opacity-50"></i>
  `;

        leagueList.appendChild(card);
      }

      async function loadUserLeagues() {
        leagueList.innerHTML = `
      <div class="bg-neutral-200 p-4 text-sm uppercase font-black opacity-60">
        Loading leagues...
      </div>
    `;

        try {
          const userRecord = await getCurrentUserRecord();

          if (!userRecord) {
            localStorage.removeItem("dragdraft_user");
            window.location.href = "auth.html";
            return;
          }

          const leagueMembers = await getLeagueMemberRecords(userRecord);

          leagueList.innerHTML = "";

          if (!leagueMembers.length) {
            leagueList.innerHTML = `
          <div class="bg-neutral-200 p-4">
            <h1 class="font-black uppercase text-lg">No leagues yet</h1>
            <p class="text-sm opacity-60 mt-1">
              Join or create a league to get started.
            </p>
          </div>
        `;
            return;
          }

          for (const leagueMember of leagueMembers) {
            const leagueId = leagueMember.fields.league?.[0];

            if (!leagueId) continue;

            const league = await getLeagueById(leagueId);

            if (league) {
              const activeSeasonId = league.fields.active_season?.[0];
              let activeSeasonName = "No active season";

              if (activeSeasonId) {
                const season = await getSeasonById(activeSeasonId);
                activeSeasonName =
                  season?.fields.friendly_name ||
                  season?.fields.name ||
                  "Unnamed season";
              }

              renderLeagueCard(league, leagueMember, activeSeasonName);
            }
          }
        } catch (err) {
          console.error(err);
          leagueList.innerHTML = `
        <div class="bg-red-100 text-red-700 p-4">
          <h1 class="font-black uppercase text-lg">Could not load leagues</h1>
          <p class="text-sm mt-1">${err.message}</p>
        </div>
      `;
        }
      }

      loadUserLeagues();
      loadNotifications();
    </script>
  </body>
</html>
