<!doctype html>
<html lang="en" data-theme="pink">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoring Rules</title>
    <link href="src/output.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
  </head>

  <body class="overflow-hidden font-gsf">
    <div class="h-screen flex flex-col">
      <div class="h-16 flex items-center px-4 justify-between shrink-0">
        <h1 class="font-black uppercase text-sm">
          <span class="text-primary">Drag</span>Draft
        </h1>

        <div class="dropdown dropdown-end">
          <button
            id="notificationsBtn"
            tabindex="0"
            class="btn btn-square btn-sm bg-neutral rounded-none text-base-100 relative"
          >
            <i class="fi fi-br-bell pt-1"></i>

            <span
              id="notificationCount"
              class="hidden absolute -top-2 -right-2 min-w-5 h-5 px-1 bg-primary text-neutral text-[10px] font-black flex items-center justify-center rounded-full"
            >
              0
            </span>
          </button>

          <div
            tabindex="0"
            class="dropdown-content z-50 mt-2 w-80 bg-base-100 shadow-xl border border-neutral-200"
          >
            <div class="p-3 border-b border-neutral-200">
              <h2 class="font-black uppercase text-sm">Notifications</h2>
            </div>

            <div id="notificationsList" class="max-h-96 overflow-y-auto">
              <div class="p-4 text-sm opacity-60">Loading...</div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="flex-1 overflow-y-auto px-4 mt-4 w-full md:max-w-3xl md:mx-auto"
      >
        <div class="flex items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <a
              id="backBtn"
              href="leagues.html"
              class="btn btn-square btn-xs bg-base-100 text-neutral border-neutral shadow-none"
            >
              <i class="fi fi-br-angle-left pt-1"></i>
            </a>

            <h1 class="font-black uppercase text-2xl">Scoring Rules</h1>
          </div>

          <button
            id="openRuleModal"
            class="btn btn-sm rounded-none bg-primary text-neutral border-0 shadow-none uppercase font-black"
          >
            New
          </button>
        </div>

        <div id="rulesList" class="grid gap-3 mt-6 pb-10">
          <div
            class="bg-neutral-100 p-4 text-sm uppercase font-black opacity-60"
          >
            Loading rules...
          </div>
        </div>
      </div>
    </div>

    <dialog id="ruleModal" class="modal">
      <div class="modal-box rounded-none bg-base-100">
        <h3 class="font-black uppercase text-lg">New Rule</h3>

        <form id="newRuleForm" class="mt-4">
          <label class="fieldset-label uppercase font-black text-xs"
            >Name</label
          >
          <input
            id="newRuleName"
            type="text"
            required
            placeholder="Ex: MINI CHALLENGE"
            class="input w-full rounded-none border-neutral-300"
          />

          <label class="fieldset-label uppercase font-black text-xs mt-4">
            Point Value
          </label>
          <input
            id="newRuleValue"
            type="number"
            required
            placeholder="5"
            class="input w-full rounded-none border-neutral-300"
          />

          <p id="modalMessage" class="text-sm mt-3 opacity-70"></p>

          <div class="flex justify-end gap-2 mt-6">
            <button
              type="button"
              id="closeRuleModal"
              class="btn btn-sm rounded-none bg-base-100 border-neutral shadow-none uppercase font-black"
            >
              Cancel
            </button>

            <button
              type="submit"
              class="btn btn-sm rounded-none bg-primary text-neutral border-0 shadow-none uppercase font-black"
            >
              Create
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <script>
      const AIRTABLE_TOKEN =
        "patVP0kfX1Ch4uKWl.896c99262e92660d8728aba045b4e1cb0a3fdebd80cf3310df67f930323d66d6";
      const BASE_ID = "appWSxdKSUmtWAIAw";

      const TABLES = {
        leagues: "Leagues",
        scoringRules: "Scoring Rules",
        notifications: "notifications",
      };

      const headers = {
        Authorization: `Bearer ${AIRTABLE_TOKEN}`,
        "Content-Type": "application/json",
      };

      const params = new URLSearchParams(window.location.search);
      const leagueId = params.get("league");

      const rulesList = document.querySelector("#rulesList");
      const backBtn = document.querySelector("#backBtn");

      const ruleModal = document.querySelector("#ruleModal");
      const openRuleModal = document.querySelector("#openRuleModal");
      const closeRuleModal = document.querySelector("#closeRuleModal");
      const newRuleForm = document.querySelector("#newRuleForm");
      const newRuleName = document.querySelector("#newRuleName");
      const newRuleValue = document.querySelector("#newRuleValue");
      const modalMessage = document.querySelector("#modalMessage");

      let currentRules = [];

      if (!leagueId) {
        rulesList.innerHTML = `
          <div class="bg-red-100 text-red-700 p-4">
            Missing league ID.
          </div>
        `;
      } else {
        backBtn.href = `league-detail.html?league=${leagueId}`;
      }

      function airtableUrl(tableName, extra = "") {
        return `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(tableName)}${extra}`;
      }

      async function getRecordById(tableName, id) {
        const res = await fetch(airtableUrl(tableName, `/${id}`), { headers });
        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          return null;
        }

        return data;
      }

      async function fetchRecords(tableName, query = "") {
        const res = await fetch(airtableUrl(tableName, query), { headers });
        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Could not load ${tableName}.`);
        }

        return data.records;
      }

      async function updateRecord(tableName, id, fields) {
        const res = await fetch(airtableUrl(tableName, `/${id}`), {
          method: "PATCH",
          headers,
          body: JSON.stringify({ fields }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Could not update ${tableName}.`);
        }

        return data;
      }

      async function createRecord(tableName, fields) {
        const res = await fetch(airtableUrl(tableName), {
          method: "POST",
          headers,
          body: JSON.stringify({ fields }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Could not create ${tableName}.`);
        }

        return data;
      }

      function escapeFormulaValue(value) {
        return String(value).replace(/"/g, '\\"');
      }

      async function loadScoringRules() {
        if (!leagueId) return;

        rulesList.innerHTML = `
    <div class="bg-neutral-100 p-4 text-sm uppercase font-black opacity-60">
      Loading rules...
    </div>
  `;

        const league = await getRecordById(TABLES.leagues, leagueId);
        const scoringRuleIds = league?.fields?.scoring_rules || [];

        currentRules = [];

        for (const ruleId of scoringRuleIds) {
          const rule = await getRecordById(TABLES.scoringRules, ruleId);
          if (rule) currentRules.push(rule);
        }

        currentRules.sort((a, b) => {
          const aName = a.fields.name || "";
          const bName = b.fields.name || "";
          return aName.localeCompare(bName);
        });

        renderRules();
      }

      function renderRules() {
        rulesList.innerHTML = "";

        if (!currentRules.length) {
          rulesList.innerHTML = `
            <div class="bg-neutral-100 p-4">
              <h2 class="font-black uppercase text-md">No rules yet</h2>
              <p class="text-sm opacity-60 mt-1">
                Create your first scoring rule for this league.
              </p>
            </div>
          `;
          return;
        }

        currentRules.forEach((rule) => {
          const row = document.createElement("div");
          row.className = "bg-neutral-100 p-4 flex items-center gap-4";

          row.innerHTML = `
            <div class="flex-1">
              <h2 class="font-black uppercase text-md leading-tight">
                ${rule.fields.name || "Untitled Rule"}
              </h2>
              <p class="text-xs uppercase opacity-50 mt-1">
                Point Value
              </p>
            </div>

            <input
              type="number"
              value="${rule.fields.point_value ?? 0}"
              data-rule-id="${rule.id}"
              class="input input-sm w-24 rounded-none border-neutral-300 text-right font-black"
            />
          `;

          const input = row.querySelector("input");

          input.addEventListener("change", async () => {
            const newValue = Number(input.value);

            input.disabled = true;

            try {
              await updateRecord(TABLES.scoringRules, rule.id, {
                point_value: newValue,
              });

              rule.fields.point_value = newValue;
            } catch (err) {
              alert(err.message);
              input.value = rule.fields.point_value ?? 0;
            } finally {
              input.disabled = false;
            }
          });

          rulesList.appendChild(row);
        });
      }

      openRuleModal.addEventListener("click", () => {
        newRuleName.value = "";
        newRuleValue.value = "";
        modalMessage.textContent = "";
        ruleModal.showModal();
      });

      closeRuleModal.addEventListener("click", () => {
        ruleModal.close();
      });

      newRuleForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = newRuleName.value.trim();
        const pointValue = Number(newRuleValue.value);

        if (!name) return;

        modalMessage.textContent = "Creating rule...";

        try {
          await createRecord(TABLES.scoringRules, {
            name,
            point_value: pointValue,
            league: [leagueId],
          });

          ruleModal.close();
          await loadScoringRules();
        } catch (err) {
          console.error(err);
          modalMessage.textContent = err.message;
        }
      });

      let currentNotifications = [];
      let notificationsMarkedRead = false;

      function updateNotificationCount(count) {
        const notificationCount = document.querySelector("#notificationCount");

        if (!notificationCount) return;

        if (!count) {
          notificationCount.classList.add("hidden");
          notificationCount.textContent = "0";
          return;
        }

        notificationCount.classList.remove("hidden");
        notificationCount.textContent = count > 9 ? "9+" : count;
      }

      function formatNotificationDate(dateString) {
        if (!dateString) return "";

        return new Date(dateString).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }

      function renderNotifications(notifications) {
        const notificationsList = document.querySelector("#notificationsList");

        if (!notificationsList) return;

        if (!notifications.length) {
          notificationsList.innerHTML = `
      <div class="p-4 text-sm opacity-60">
        No notifications yet.
      </div>
    `;
          return;
        }

        notificationsList.innerHTML = "";

        notifications.forEach((notification) => {
          const item = document.createElement("div");
          item.className = "p-4 border-b border-neutral-200 last:border-b-0";

          item.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <h3 class="font-black uppercase text-sm leading-tight">
          ${notification.fields.subject || "Notification"}
        </h3>

        <span class="text-[10px] uppercase opacity-50 whitespace-nowrap">
          ${formatNotificationDate(notification.fields.created_at)}
        </span>
      </div>

      <p class="text-sm opacity-70 mt-1">
        ${notification.fields.body_text || ""}
      </p>
    `;

          notificationsList.appendChild(item);
        });
      }

      async function updateRecord(tableName, id, fields) {
        const res = await fetch(airtableUrl(tableName, `/${id}`), {
          method: "PATCH",
          headers,
          body: JSON.stringify({ fields }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          throw new Error(`Could not update ${tableName}.`);
        }

        return data;
      }

      async function getUserNotifications(userRecordId) {
        const notifications = await airtableFetch(TABLES.notifications);

        return notifications
          .filter((notification) => {
            const users = notification.fields.user || [];
            const isUnread = notification.fields.read !== true;

            return users.includes(userRecordId) && isUnread;
          })
          .sort((a, b) => {
            return (
              new Date(b.fields.created_at) - new Date(a.fields.created_at)
            );
          });
      }

      async function markNotificationsAsRead(notifications) {
        for (const notification of notifications) {
          await updateRecord(TABLES.notifications, notification.id, {
            read: true,
          });
        }
      }

      async function loadNotifications() {
        try {
          const userRecord = await getCurrentUserRecord();

          currentNotifications = await getUserNotifications(userRecord.id);

          renderNotifications(currentNotifications);
          updateNotificationCount(currentNotifications.length);
        } catch (err) {
          console.error("Could not load notifications:", err);

          const notificationsList =
            document.querySelector("#notificationsList");

          if (notificationsList) {
            notificationsList.innerHTML = `
        <div class="p-4 text-sm text-red-700 bg-red-100">
          Could not load notifications.
        </div>
      `;
          }
        }
      }

      function initializeNotifications() {
        const notificationsDropdown =
          document.querySelector(".dropdown-content");

        if (!notificationsDropdown) return;

        notificationsDropdown.addEventListener("focusin", async () => {
          if (notificationsMarkedRead || !currentNotifications.length) return;

          notificationsMarkedRead = true;

          try {
            await markNotificationsAsRead(currentNotifications);

            currentNotifications = [];
            renderNotifications([]);
            updateNotificationCount(0);
          } catch (err) {
            console.error("Could not mark notifications as read:", err);
          }
        });
      }

      loadScoringRules();
    </script>
  </body>
</html>
