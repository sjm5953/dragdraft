<!doctype html>
<html lang="en" data-theme="pink">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DragDraft</title>

    <!-- tailwind -->
    <link href="src/output.css" rel="stylesheet" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
  </head>

  <body class="font-gsf bg-neutral-50 text-neutral-900">
    <!-- NAV -->
    <div class="flex items-center justify-between px-4 h-16">
      <h1 class="font-black uppercase text-sm">
        <span class="text-primary">Drag</span>Draft
      </h1>

      <a
        href="auth.html"
        class="btn btn-sm rounded-none bg-neutral text-base-100 border-0 shadow-none uppercase font-black"
      >
        Login
      </a>
    </div>

    <!-- HERO -->
    <div
      class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center text-center px-6"
    >
      <h1 class="text-4xl md:text-5xl font-black uppercase leading-tight">
        Draft Queens.<br />
        Earn Points.<br />
        Win Your League.
      </h1>

      <p class="mt-4 text-sm md:text-base opacity-60 max-w-md">
        Build your roster, swap queens between episodes, and compete with your
        friends in a Drag Race fantasy league.
      </p>

      <a
        href="auth.html"
        class="btn mt-6 rounded-none bg-primary text-neutral border-0 shadow-none uppercase font-black px-6"
      >
        Get Started
      </a>
    </div>
  </body>
</html>
